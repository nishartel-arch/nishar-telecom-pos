<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchases — Nishar Telecom POS</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Purchases</h1><p>Record stock purchases from suppliers</p></div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-purchase-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Purchase
          </button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="input-group" style="min-width:220px;">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" class="form-input" id="pur-search" placeholder="Search by supplier or product…"/>
          </div>
        </div>
        <div class="toolbar-right">
          <span id="pur-count" class="text-muted" style="line-height:36px;"></span>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Ref No.</th><th>Supplier</th><th>Product</th><th>Qty</th><th>Unit Cost</th><th>Total Cost</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="pur-tbody"></tbody>
          </table>
        </div>
        <div id="pur-empty" style="display:none;" class="empty-state">
          <div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
          <h3>No purchases recorded</h3><p>Record your first stock purchase</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add Purchase Modal -->
<div class="modal-backdrop" id="purchase-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Record Purchase</h2>
      <button class="btn-icon-ghost" id="close-purchase-modal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Product *</label>
        <select class="form-select" id="pur-product">
          <option value="">Select a product…</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Supplier Name</label>
          <input type="text" class="form-input" id="pur-supplier" placeholder="Supplier / Distributor"/>
        </div>
        <div class="form-group">
          <label class="form-label">Reference No.</label>
          <input type="text" class="form-input" id="pur-ref" placeholder="Auto-generated if blank"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input type="number" class="form-input" id="pur-qty" min="1" placeholder="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Unit Cost (₹) *</label>
          <input type="number" class="form-input" id="pur-cost" min="0" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div id="pur-total-row" style="display:none;background:var(--primary-bg);border:1px solid var(--primary);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm);color:var(--primary);">
        Total Cost: <span id="pur-total-val" class="text-mono" style="font-weight:700;"></span>
      </div>
      <div class="form-group mt-4">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="pur-notes" placeholder="Optional notes…" style="min-height:60px;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-purchase-modal">Cancel</button>
      <button class="btn btn-primary" id="save-purchase-btn">Record Purchase</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="confirm-modal">
  <div class="modal modal-sm">
    <div class="modal-body" style="text-align:center;padding:var(--sp-8) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;"><button class="btn btn-secondary" id="confirm-cancel">Cancel</button><button class="btn btn-danger" id="confirm-ok">Confirm</button></div>
    </div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script><script src="js/app.js"></script><script src="js/purchases.js"></script>
</body></html>
