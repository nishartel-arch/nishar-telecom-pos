<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suppliers — Nishar Telecom POS</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/fav-suppliers-32.png"/>
  <link rel="icon" type="image/svg+xml" href="assets/fav-suppliers.svg"/>
  <link rel="apple-touch-icon" href="assets/fav-suppliers-180.png"/>
  <meta name="theme-color" content="#4B8BF5"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Suppliers</h1><p>Manage vendors and what you owe them</p></div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-supplier-btn" data-perm="suppliers.manage">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Supplier
          </button>
        </div>
      </div>

      <div class="stats-grid" id="sup-stats" style="margin-bottom:var(--sp-5);"></div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="input-group" style="min-width:240px;">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" class="form-input" id="sup-search" placeholder="Search by name, phone, or GSTIN…"/>
          </div>
          <select class="form-select" id="sup-due-filter" style="width:auto;min-width:160px;">
            <option value="">All suppliers</option>
            <option value="dues">Owed money to</option>
            <option value="paid">Fully paid</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span id="sup-count" class="text-muted" style="line-height:36px;"></span>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Name</th><th>Contact</th><th>Phone</th><th>GSTIN</th><th>We Owe</th><th>Added</th><th>Actions</th>
            </tr></thead>
            <tbody id="sup-tbody"></tbody>
          </table>
        </div>
        <div id="sup-empty" style="display:none;" class="empty-state">
          <div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
          <h3>No suppliers yet</h3><p>Add your first vendor to track what you owe them</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add / Edit Supplier Modal -->
<div class="modal-backdrop" id="supplier-modal">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h2 class="modal-title" id="supplier-modal-title">Add Supplier</h2>
      <button class="btn-icon-ghost" id="close-supplier-modal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sup-id"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" class="form-input" id="s-name" placeholder="e.g. Acme Distributors"/>
        </div>
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input type="text" class="form-input" id="s-contact" placeholder="e.g. Mr. Sharma"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" class="form-input" id="s-phone" placeholder="10-digit or international"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="s-email" placeholder="optional"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">GSTIN</label>
          <input type="text" class="form-input" id="s-gstin" placeholder="optional"/>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" class="form-input" id="s-address" placeholder="optional"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="s-notes" placeholder="Optional notes" style="min-height:50px;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-supplier-modal">Cancel</button>
      <button class="btn btn-primary" id="save-supplier-btn">Save</button>
    </div>
  </div>
</div>

<!-- Pay Supplier Modal -->
<div class="modal-backdrop" id="sup-pay-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Pay Supplier</h2>
      <button class="btn-icon-ghost" id="close-suppay-modal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sp-sup-id"/>
      <div id="sp-sup-info" style="padding:12px;background:var(--surface-2);border-radius:var(--r-sm);margin-bottom:var(--sp-4);"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount Paying (₹) *</label>
          <input type="number" class="form-input" id="sp-amount" min="0" step="0.01" placeholder="0.00"/>
          <small class="text-muted" style="font-size:11px;display:block;margin-top:4px;">
            <button type="button" id="sp-pay-full" style="background:none;border:none;color:var(--primary);font-size:11px;cursor:pointer;padding:0;">Pay full balance</button>
          </small>
        </div>
        <div class="form-group">
          <label class="form-label">Via</label>
          <select class="form-select" id="sp-method">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
            <option value="Bank">Bank Transfer</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <input type="text" class="form-input" id="sp-note" placeholder="Optional reference / cheque no."/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-suppay-modal">Cancel</button>
      <button class="btn btn-primary" id="save-suppay-btn">Record Payment</button>
    </div>
  </div>
</div>

<!-- Confirm modal (shared) -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-body" style="text-align:center;padding:var(--sp-7) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;"><button class="btn btn-secondary" id="confirm-cancel">Cancel</button><button class="btn btn-danger" id="confirm-ok">Confirm</button></div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/suppliers.js"></script>
</body>
</html>
