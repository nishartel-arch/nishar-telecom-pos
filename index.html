<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Nishar Telecom POS</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content" id="page-content">
      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card blue">
          <div class="stat-top"><div class="stat-icon blue skeleton" style="width:42px;height:42px;"></div></div>
          <div class="skeleton" style="height:28px;width:80px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:120px;"></div>
        </div>
        <div class="stat-card green">
          <div class="stat-top"><div class="stat-icon green skeleton" style="width:42px;height:42px;"></div></div>
          <div class="skeleton" style="height:28px;width:80px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:120px;"></div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-top"><div class="stat-icon yellow skeleton" style="width:42px;height:42px;"></div></div>
          <div class="skeleton" style="height:28px;width:80px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:120px;"></div>
        </div>
        <div class="stat-card red">
          <div class="stat-top"><div class="stat-icon red skeleton" style="width:42px;height:42px;"></div></div>
          <div class="skeleton" style="height:28px;width:80px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:14px;width:120px;"></div>
        </div>
      </div>

      <!-- Bottom row -->
      <div style="display:grid;grid-template-columns:1fr 340px;gap:var(--sp-5);">
        <div class="card">
          <div class="card-header">
            <div><div class="card-title">Recent Sales</div></div>
            <a href="sales.html" class="btn btn-secondary">View All</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Invoice</th><th>Customer</th><th>Items</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th></tr></thead>
              <tbody id="recent-sales-tbody">
                <tr><td colspan="7"><div class="skeleton" style="height:14px;width:100%;"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Low Stock Alert</div></div>
          <div id="low-stock-list">
            <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:14px;width:80%;margin-bottom:8px;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal modal-sm">
    <div class="modal-body" style="text-align:center;padding:var(--sp-8) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
