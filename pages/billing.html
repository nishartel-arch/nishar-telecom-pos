<div class="billing-page">

<div class="billing-top">

<h2>Create Bill</h2>

<button onclick="saveBill()">
Save Bill
</button>

</div>


<!-- PRODUCT SELECT -->

<div class="billing-card">

<select id="product-select">

<option value="">
Select Product
</option>

</select>

<input
type="number"
id="bill-qty"
placeholder="Qty"
value="1"
/>

<input
type="text"
id="customer-phone"
placeholder="Customer WhatsApp Number"
/>

<button onclick="addToBill()">
Add
</button>

</div>


<!-- BILL TABLE -->

<table class="bill-table">

<thead>

<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Action</th>
</tr>

</thead>

<tbody id="bill-items">
</tbody>

</table>


<!-- TOTAL -->

<div class="bill-summary">

<h2>
Grand Total:
₹<span id="grand-total">0</span>
</h2>

</div>

</div>
