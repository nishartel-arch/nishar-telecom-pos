<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory — Nishar Telecom POS</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Inventory</h1><p>Manage your product catalogue and stock levels</p></div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-product-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
          </button>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="input-group" style="min-width:220px;">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" class="form-input" id="inv-search" placeholder="Search products…"/>
          </div>
          <select class="form-select" id="inv-category" style="width:auto;min-width:140px;">
            <option value="">All Categories</option>
            <option value="Smartphones">Smartphones</option>
            <option value="Tablets">Tablets</option>
            <option value="Accessories">Accessories</option>
            <option value="SIM Cards">SIM Cards</option>
            <option value="Recharge">Recharge</option>
            <option value="Other">Other</option>
          </select>
          <select class="form-select" id="inv-stock-filter" style="width:auto;min-width:130px;">
            <option value="">All Stock</option>
            <option value="low">Low Stock (≤5)</option>
            <option value="out">Out of Stock</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span id="inv-count" class="text-muted" style="line-height:36px;"></span>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Product Name</th><th>Category</th><th>Brand</th>
              <th>Buy Price</th><th>Sell Price</th><th>Stock</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody id="inventory-tbody"></tbody>
          </table>
        </div>
        <div id="inventory-empty" style="display:none;" class="empty-state">
          <div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
          <h3>No products yet</h3><p>Click "Add Product" to get started</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal-backdrop" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="product-modal-title">Add Product</h2>
      <button class="btn-icon-ghost" id="close-product-modal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="product-id"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" class="form-input" id="p-name" placeholder="e.g. Samsung Galaxy A25"/>
        </div>
        <div class="form-group">
          <label class="form-label">Brand</label>
          <input type="text" class="form-input" id="p-brand" placeholder="e.g. Samsung"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-select" id="p-category">
            <option value="">Select category</option>
            <option value="Smartphones">Smartphones</option>
            <option value="Tablets">Tablets</option>
            <option value="Accessories">Accessories</option>
            <option value="SIM Cards">SIM Cards</option>
            <option value="Recharge">Recharge</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Stock Quantity *</label>
          <input type="number" class="form-input" id="p-stock" min="0" placeholder="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Buy Price (₹) *</label>
          <input type="number" class="form-input" id="p-buy-price" min="0" step="0.01" placeholder="0.00"/>
        </div>
        <div class="form-group">
          <label class="form-label">Sell Price (₹) *</label>
          <input type="number" class="form-input" id="p-sell-price" min="0" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="p-description" placeholder="Optional product description…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-product-modal">Cancel</button>
      <button class="btn btn-primary" id="save-product-btn">Save Product</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal modal-sm">
    <div class="modal-body" style="text-align:center;padding:var(--sp-8) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/inventory.js"></script>
</body></html>
