<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales — Nishar Telecom POS</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="page-header">
        <div><h1>Sales History</h1><p>View and manage all completed transactions</p></div>
      </div>

      <div class="stats-grid" id="sales-stats" style="margin-bottom:var(--sp-5);"></div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="input-group" style="min-width:220px;">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" class="form-input" id="sales-search" placeholder="Search by invoice or customer…"/>
          </div>
          <select class="form-select" id="sales-method" style="width:auto;min-width:130px;">
            <option value="">All Payments</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
            <option value="Credit">Credit</option>
          </select>
          <select class="form-select" id="sales-period" style="width:auto;min-width:130px;">
            <option value="">All Time</option>
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span id="sales-count" class="text-muted" style="line-height:36px;"></span>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Invoice</th><th>Customer</th><th>Items</th><th>Subtotal</th><th>Discount</th><th>Total</th><th>Payment</th><th>Date</th><th></th></tr></thead>
            <tbody id="sales-tbody"></tbody>
          </table>
        </div>
        <div id="sales-empty" style="display:none;" class="empty-state">
          <div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <h3>No sales found</h3><p>Try adjusting your filters</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Invoice view modal -->
<div class="modal-backdrop" id="view-invoice-modal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Invoice Detail</h2>
      <button class="btn-icon-ghost" id="close-view-invoice"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="view-invoice-body"></div>
    <div class="modal-footer"><button class="btn btn-secondary" id="close-view-invoice-btn">Close</button></div>
  </div>
</div>

<div class="modal-backdrop" id="confirm-modal">
  <div class="modal modal-sm">
    <div class="modal-body" style="text-align:center;padding:var(--sp-8) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;"><button class="btn btn-secondary" id="confirm-cancel">Cancel</button><button class="btn btn-danger" id="confirm-ok">Confirm</button></div>
    </div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script><script src="js/app.js"></script><script src="js/sales.js"></script>
</body></html>
