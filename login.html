<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nishar Telecom POS — Login</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="overflow:auto;">
<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="44" height="44" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2D6CE3;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#4B8BF5;stop-opacity:1" />
            </linearGradient>
          </defs>
          <g stroke="url(#logo-grad)" stroke-width="3" fill="none" stroke-linecap="round">
            <line x1="150" y1="60" x2="150" y2="140"/>
            <line x1="150" y1="140" x2="100" y2="170"/>
            <line x1="100" y1="170" x2="50" y2="140"/>
            <line x1="50" y1="140" x2="50" y2="60"/>
            <line x1="50" y1="60" x2="100" y2="30"/>
            <line x1="100" y1="30" x2="150" y2="60"/>
          </g>
          <g fill="url(#logo-grad)">
            <circle cx="100" cy="30" r="8"/>
            <circle cx="150" cy="60" r="8"/>
            <circle cx="150" cy="140" r="8"/>
            <circle cx="100" cy="170" r="8"/>
            <circle cx="50" cy="140" r="8"/>
            <circle cx="50" cy="60" r="8"/>
            <circle cx="100" cy="100" r="6" style="fill:#FF9500;"/>
          </g>
          <g stroke="#4B8BF5" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round">
            <line x1="100" y1="30" x2="100" y2="100"/>
            <line x1="150" y1="60" x2="100" y2="100"/>
            <line x1="150" y1="140" x2="100" y2="100"/>
          </g>
        </svg>
      </div>
      <span class="login-logo-text">Nishar Telecom</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to access the POS system</p>

    <div id="error-msg" style="display:none; background:var(--danger-bg); color:var(--danger); border:1px solid var(--danger); border-radius:var(--r-md); padding:var(--sp-3) var(--sp-4); font-size:var(--fs-sm); margin-bottom:var(--sp-4);"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" id="toggle-pw" class="input-suffix" style="pointer-events:all; background:none; border:none; cursor:pointer; color:var(--text-muted);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pw-eye">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:var(--sp-2);">
      Sign In
    </button>

    <div class="login-footer">
      Nishar Telecom POS &copy; 2025 · Internal Use Only
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  firebase.auth().onAuthStateChanged(user => {
    if (user) location.href = 'index.html';
  });

  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const isText = passEl.type === 'text';
    passEl.type = isText ? 'password' : 'text';
  });

  loginBtn.addEventListener('click', async () => {
    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!email || !password) {
      showErr('Please enter your email and password.'); return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Signing in…';
    errEl.style.display = 'none';

    try {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      location.href = 'index.html';
    } catch (err) {
      const msgs = {
        'auth/user-not-found':  'No account found with this email.',
        'auth/wrong-password':  'Incorrect password. Please try again.',
        'auth/invalid-email':   'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
      };
      showErr(msgs[err.code] || 'Sign-in failed. Please try again.');
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Sign In';
    }
  });

  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  }));

  function showErr(msg) {
    errEl.textContent    = msg;
    errEl.style.display  = 'block';
  }
</script>
</body>
</html>
