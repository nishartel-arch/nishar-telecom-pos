<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nishar Telecom POS — Login</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/fav-login-32.png"/>
  <link rel="icon" type="image/svg+xml" href="assets/logo-hexagon-dark.svg"/>
  <link rel="apple-touch-icon" href="assets/fav-login-180.png"/>
  <meta name="theme-color" content="#071042"/>
  <script>
    (() => {
      const themes = ['blue', 'purple', 'dark', 'ocean', 'light'];
      const saved = localStorage.getItem('pos-theme');
      document.documentElement.setAttribute('data-theme', themes.includes(saved) ? saved : 'blue');
    })();
  </script>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="overflow:auto;">
<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img id="login-logo" src="assets/logo-hexagon-dark.svg" alt="Nishar Telecom logo"/>
      </div>
      <span class="login-logo-text">Nishar Telecom</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to access the glass POS workspace</p>

    <div id="error-msg" style="display:none; background:var(--danger-bg); color:var(--danger); border:1px solid var(--danger); border-radius:var(--r-md); padding:var(--sp-3) var(--sp-4); font-size:var(--fs-sm); margin-bottom:var(--sp-4);"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" id="toggle-pw" class="input-suffix" style="pointer-events:all; background:none; border:none; cursor:pointer; color:var(--text-muted);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pw-eye">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:var(--sp-2);">
      Sign In
    </button>

    <div class="login-footer">
      Nishar Telecom POS &copy; <span id="footer-year">2026</span> · Internal Use Only
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  firebase.auth().onAuthStateChanged(user => {
    if (user) location.href = 'index.html';
  });

  // Match the logo ink to the active theme (light theme → light-ink hexagon).
  if (document.documentElement.getAttribute('data-theme') === 'light') {
    document.getElementById('login-logo').src = 'assets/logo-hexagon-light.svg';
  }

  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const isText = passEl.type === 'text';
    passEl.type = isText ? 'password' : 'text';
  });

  loginBtn.addEventListener('click', async () => {
    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!email || !password) {
      showErr('Please enter your email and password.'); return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Signing in…';
    errEl.style.display = 'none';

    try {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      location.href = 'index.html';
    } catch (err) {
      const msgs = {
        'auth/user-not-found':  'No account found with this email.',
        'auth/wrong-password':  'Incorrect password. Please try again.',
        'auth/invalid-email':   'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
      };
      showErr(msgs[err.code] || 'Sign-in failed. Please try again.');
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Sign In';
    }
  });

  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  }));

  document.getElementById('footer-year').textContent = new Date().getFullYear();

  function showErr(msg) {
    errEl.textContent    = msg;
    errEl.style.display  = 'block';
  }
</script>
</body>
</html>
