<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nishar Telecom POS – Billing</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Billing-specific styles */
    .billing-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--space-6);
      height: calc(100vh - var(--topbar-height) - var(--space-12));
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-3);
      max-height: 400px;
      overflow-y: auto;
      padding-right: var(--space-2);
    }

    .product-card {
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
    }

    .product-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .product-card.selected {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .product-card .product-name {
      font-weight: 600;
      font-size: var(--text-sm);
      margin-bottom: var(--space-1);
      color: var(--color-text);
      line-height: 1.3;
    }

    .product-card .product-price {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-primary);
    }

    .product-card .product-stock {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }

    .product-card.out-of-stock {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: var(--color-border);
    }

    .product-card.out-of-stock:hover {
      transform: none;
      box-shadow: none;
    }

    .cart-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .cart-header {
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-4);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 500;
      font-size: var(--text-sm);
    }

    .cart-item-price {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .cart-item-quantity {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      color: var(--color-text);
      transition: all var(--transition-fast);
      padding: 0;
      line-height: 1;
    }

    .qty-btn:hover {
      background: var(--color-primary-light);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .qty-value {
      font-weight: 600;
      font-size: var(--text-sm);
      min-width: 24px;
      text-align: center;
    }

    .cart-item-total {
      font-weight: 600;
      font-size: var(--text-sm);
      min-width: 70px;
      text-align: right;
    }

    .cart-item-remove {
      background: none;
      border: none;
      color: var(--color-danger);
      cursor: pointer;
      padding: var(--space-1);
      margin-left: var(--space-2);
      opacity: 0.6;
      transition: opacity var(--transition-fast);
    }

    .cart-item-remove:hover {
      opacity: 1;
    }

    .cart-footer {
      padding: var(--space-4);
      border-top: 1px solid var(--color-border);
      background: var(--color-bg);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
    }

    .cart-summary-row.total {
      font-size: var(--text-xl);
      font-weight: 700;
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 2px solid var(--color-border);
    }

    .cart-empty {
      text-align: center;
      padding: var(--space-8);
      color: var(--color-text-muted);
    }

    .cart-empty svg {
      margin-bottom: var(--space-3);
      opacity: 0.5;
    }

    .customer-select-section {
      margin-bottom: var(--space-4);
    }

    /* Search bar */
    .search-bar {
      position: relative;
    }

    .search-bar input {
      padding-left: 2.5rem;
    }

    .search-bar svg {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .billing-layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        max-height: 300px;
      }

      .cart-section {
        min-height: 400px;
      }
    }

    @media (max-width: 640px) {
      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: var(--space-2);
      }

      .product-card {
        padding: var(--space-2);
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <span class="logo">Nishar POS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="billing.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Billing
        </a>
        <a href="inventory.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Inventory
        </a>
        <a href="customers.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Customers
        </a>
        <a href="purchases.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Purchases
        </a>
        <a href="analytics.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Analytics
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-icon" id="darkModeToggle" title="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="btn btn-ghost" id="logoutBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="main-content">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Billing Counter</span>
        <div class="topbar-actions">
          <span style="font-size: var(--text-sm); color: var(--color-text-muted);" id="currentDateTime"></span>
        </div>
      </header>

      <main class="page-content">
        <!-- ====== Billing Layout ====== -->
        <div class="billing-layout">
          <!-- Left: Product Selection -->
          <div class="card" style="display: flex; flex-direction: column;">
            <!-- Search & Category Filter -->
            <div style="display: flex; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap;">
              <div class="search-bar" style="flex: 1; min-width: 200px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="form-input" id="productSearch" placeholder="Search products by name or brand..." />
              </div>
              <select class="form-select" id="categoryFilter" style="width: auto; min-width: 150px;">
                <option value="">All Categories</option>
                <option value="Smartphones">Smartphones</option>
                <option value="Tablets">Tablets</option>
                <option value="Accessories">Accessories</option>
                <option value="SIM Cards">SIM Cards</option>
                <option value="Recharge">Recharge</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <!-- Product Grid -->
            <div class="product-grid" id="productGrid">
              <!-- Populated by JS -->
            </div>

            <!-- Empty State -->
            <div id="productEmptyState" style="display: none; text-align: center; padding: var(--space-8); color: var(--color-text-muted);">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin: 0 auto var(--space-3);">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              </svg>
              <p style="font-weight: 500;">No products found</p>
              <p style="font-size: var(--text-sm);">Try adjusting your search or filter.</p>
            </div>
          </div>

          <!-- Right: Cart -->
          <div class="cart-section">
            <!-- Cart Header -->
            <div class="cart-header">
              <h2 style="font-size: var(--text-lg); font-weight: 600;">Current Bill</h2>
              <button class="btn btn-ghost btn-icon" id="clearCartBtn" title="Clear cart">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>

            <!-- Customer Selection -->
            <div class="customer-select-section" style="padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border);">
              <label class="form-label" for="customerSelect">Customer</label>
              <div style="display: flex; gap: var(--space-2);">
                <select class="form-select" id="customerSelect" style="flex: 1;">
                  <option value="">Walk-in Customer</option>
                  <!-- Populated by JS -->
                </select>
                <button class="btn btn-ghost btn-icon" id="addCustomerQuickBtn" title="Add new customer">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
              </div>
            </div>

            <!-- Cart Items -->
            <div class="cart-items" id="cartItems">
              <div class="cart-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                  <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <p style="font-weight: 500; margin-top: var(--space-2);">Cart is empty</p>
                <p style="font-size: var(--text-sm);">Click on products to add them</p>
              </div>
            </div>

            <!-- Cart Footer -->
            <div class="cart-footer">
              <div class="cart-summary-row">
                <span>Subtotal</span>
                <span id="subtotal">₹0.00</span>
              </div>
              <div class="cart-summary-row">
                <span>Discount</span>
                <div style="display: flex; align-items: center; gap: var(--space-2);">
                  <input type="number" class="form-input" id="discountInput" value="0" min="0" style="width: 70px; text-align: right; padding: 0.25rem 0.5rem;" />
                  <span>₹</span>
                </div>
              </div>
              <div class="cart-summary-row">
                <span>Items</span>
                <span id="itemCount">0</span>
              </div>
              <div class="cart-summary-row total">
                <span>Total</span>
                <span id="grandTotal">₹0.00</span>
              </div>

              <!-- Payment Method -->
              <div class="form-group" style="margin-top: var(--space-3);">
                <label class="form-label" for="paymentMethod">Payment Method</label>
                <select class="form-select" id="paymentMethod">
                  <option value="Cash">Cash</option>
                  <option value="UPI">UPI</option>
                  <option value="Card">Card</option>
                  <option value="Credit">Credit (Pay Later)</option>
                </select>
              </div>

              <!-- Action Buttons -->
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); margin-top: var(--space-3);">
                <button class="btn btn-secondary" id="holdBillBtn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Hold
                </button>
                <button class="btn btn-primary" id="checkoutBtn" disabled>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  Checkout
                </button>
              </div>
              <button class="btn btn-secondary" style="width: 100%; margin-top: var(--space-2);" id="printBillBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 12H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Print Bill
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ====== Quick Add Customer Modal ====== -->
  <div class="modal-overlay" id="quickCustomerModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="card-title">Add Customer</h2>
        <button class="btn btn-ghost btn-icon" id="closeQuickCustomerModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="quickCustomerForm">
        <div class="form-group">
          <label class="form-label" for="quickCustomerName">Full Name *</label>
          <input type="text" class="form-input" id="quickCustomerName" required placeholder="Customer name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="quickCustomerPhone">Phone Number *</label>
          <input type="tel" class="form-input" id="quickCustomerPhone" required placeholder="Phone number" />
        </div>
        <div style="display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-4);">
          <button type="button" class="btn btn-secondary" id="cancelQuickCustomerBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save & Select</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====== Invoice Preview Modal ====== -->
  <div class="modal-overlay" id="invoiceModal" style="display: none;">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="card-title">Invoice</h2>
        <button class="btn btn-ghost btn-icon" id="closeInvoiceModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="invoiceContent" style="font-size: var(--text-sm);">
        <!-- Populated on checkout -->
      </div>
      <div style="display: flex; gap: var(--space-3); margin-top: var(--space-4);">
        <button class="btn btn-secondary" style="flex: 1;" id="downloadPdfBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
        <button class="btn btn-primary" style="flex: 1;" id="newBillBtn">New Bill</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Your existing scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/billing.js"></script>

  <!-- UI helpers + Billing logic -->
  <script>
    // ============ SIDEBAR & GLOBAL UI ============
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.querySelectorAll('.nav-item').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
      });
    });

    // Dark mode
    const darkToggle = document.getElementById('darkModeToggle');
    darkToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('theme', current === 'dark' ? 'light' : 'dark');
    });
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Toast system
    window.showToast = function(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${type === 'success' 
            ? '<polyline points="20 6 9 17 4 12"/>' 
            : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}
        </svg>
        ${message}
      `;
      container.appendChild(toast);
      setTimeout(() => { 
        toast.style.opacity = '0'; 
        toast.style.transform = 'translateX(100%)'; 
        setTimeout(() => toast.remove(), 300); 
      }, 3000);
    };

    // Override alert with toast
    window.alert = function(msg) {
      if (msg.toLowerCase().includes('error') || msg.toLowerCase().includes('fail')) {
        showToast(msg, 'error');
      } else {
        showToast(msg, 'success');
      }
    };

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      firebase.auth().signOut().then(() => window.location.href = 'login.html');
    });

    // Live clock
    function updateClock() {
      const now = new Date();
      document.getElementById('currentDateTime').textContent = now.toLocaleString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ============ BILLING STATE ============
    let cart = [];
    let products = [];
    let customers = [];

    // DOM refs
    const productGrid = document.getElementById('productGrid');
    const productEmpty = document.getElementById('productEmptyState');
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('subtotal');
    const grandTotalEl = document.getElementById('grandTotal');
    const itemCountEl = document.getElementById('itemCount');
    const discountInput = document.getElementById('discountInput');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const printBillBtn = document.getElementById('printBillBtn');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const customerSelect = document.getElementById('customerSelect');
    const productSearch = document.getElementById('productSearch');
    const categoryFilter = document.getElementById('categoryFilter');

    // ============ LOAD DATA ============
    async function loadProducts() {
      try {
        const snapshot = await firebase.firestore().collection('products').get();
        products = [];
        snapshot.forEach(doc => {
          products.push({ id: doc.id, ...doc.data() });
        });
        renderProducts();
      } catch (error) {
        console.error('Error loading products:', error);
        showToast('Failed to load products', 'error');
      }
    }

    async function loadCustomers() {
      try {
        const snapshot = await firebase.firestore().collection('customers').get();
        customers = [];
        snapshot.forEach(doc => {
          customers.push({ id: doc.id, ...doc.data() });
        });
        renderCustomerOptions();
      } catch (error) {
        console.error('Error loading customers:', error);
      }
    }

    // ============ RENDER PRODUCTS ============
    function renderProducts(filteredProducts = null) {
      const data = filteredProducts || products;
      productGrid.innerHTML = '';

      if (data.length === 0) {
        productGrid.style.display = 'none';
        productEmpty.style.display = 'block';
      } else {
        productGrid.style.display = 'grid';
        productEmpty.style.display = 'none';

        data.forEach(product => {
          const card = document.createElement('div');
          card.className = 'product-card';
          if (product.stock <= 0) card.classList.add('out-of-stock');
          
          const isInCart = cart.find(item => item.id === product.id);
          if (isInCart) card.classList.add('selected');

          card.innerHTML = `
            <div class="product-name">${product.name || 'Unnamed'}</div>
            <div class="product-price">₹${parseFloat(product.price || 0).toFixed(2)}</div>
            <div class="product-stock">Stock: ${product.stock || 0}</div>
          `;

          if (product.stock > 0) {
            card.addEventListener('click', () => addToCart(product));
          }

          productGrid.appendChild(card);
        });
      }
    }

    // ============ RENDER CUSTOMERS ============
    function renderCustomerOptions() {
      customerSelect.innerHTML = '<option value="">Walk-in Customer</option>';
      customers.forEach(customer => {
        const option = document.createElement('option');
        option.value = customer.id;
        option.textContent = `${customer.name || 'Unknown'} - ${customer.phone || 'N/A'}`;
        customerSelect.appendChild(option);
      });
    }

    // ============ CART OPERATIONS ============
    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      
      if (existing) {
        if (existing.quantity < product.stock) {
          existing.quantity++;
        } else {
          showToast('Not enough stock available', 'warning');
          return;
        }
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: parseFloat(product.price || 0),
          quantity: 1,
          stock: product.stock
        });
      }

      updateCart();
      renderProducts();
      showToast(`${product.name} added to cart`);
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCart();
      renderProducts();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(item => item.id === productId);
      if (!item) return;

      item.quantity += delta;

      if (item.quantity <= 0) {
        removeFromCart(productId);
        return;
      }

      if (item.quantity > item.stock) {
        item.quantity = item.stock;
        showToast('Maximum stock reached', 'warning');
      }

      updateCart();
      renderProducts();
    }

    function clearCart() {
      if (cart.length === 0) return;
      if (confirm('Are you sure you want to clear the cart?')) {
        cart = [];
        updateCart();
        renderProducts();
        showToast('Cart cleared');
      }
    }

    function updateCart() {
      // Update cart items display
      if (cart.length === 0) {
        cartItemsEl.innerHTML = `
          <div class="cart-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <p style="font-weight: 500; margin-top: var(--space-2);">Cart is empty</p>
            <p style="font-size: var(--text-sm);">Click on products to add them</p>
          </div>
        `;
      } else {
        cartItemsEl.innerHTML = cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">₹${item.price.toFixed(2)} each</div>
            </div>
            <div class="cart-item-quantity">
              <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">−</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
            </div>
            <div class="cart-item-total">₹${(item.price * item.quantity).toFixed(2)}</div>
            <button class="cart-item-remove" onclick="removeFromCart('${item.id}')" title="Remove">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        `).join('');
      }

      // Calculate totals
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const discount = parseFloat(discountInput.value) || 0;
      const total = Math.max(0, subtotal - discount);
      const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

      subtotalEl.textContent = `₹${subtotal.toFixed(2)}`;
      grandTotalEl.textContent = `₹${total.toFixed(2)}`;
      itemCountEl.textContent = itemCount;

      // Enable/disable buttons
      checkoutBtn.disabled = cart.length === 0;
      printBillBtn.disabled = cart.length === 0;
    }

    // ============ CHECKOUT ============
    async function checkout() {
      if (cart.length === 0) {
        showToast('Cart is empty', 'warning');
        return;
      }

      const customerId = customerSelect.value;
      const paymentMethod = document.getElementById('paymentMethod').value;
      const discount = parseFloat(discountInput.value) || 0;
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const total = Math.max(0, subtotal - discount);
      const selectedCustomer = customers.find(c => c.id === customerId);

      checkoutBtn.disabled = true;
      checkoutBtn.innerHTML = '<span class="spinner"></span> Processing...';

      try {
        // Check stock one more time
        for (const item of cart) {
          const productDoc = await firebase.firestore().collection('products').doc(item.id).get();
          const currentStock = productDoc.data()?.stock || 0;
          if (currentStock < item.quantity) {
            showToast(`Insufficient stock for ${item.name}`, 'error');
            checkoutBtn.disabled = false;
            checkoutBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Checkout';
            return;
          }
        }

        // Use batch write for atomicity
        const batch = firebase.firestore().batch();

        // Update stock for each product
        for (const item of cart) {
          const productRef = firebase.firestore().collection('products').doc(item.id);
          batch.update(productRef, {
            stock: firebase.firestore.FieldValue.increment(-item.quantity)
          });
        }

        // Create sale record
        const saleRef = firebase.firestore().collection('sales').doc();
        const saleData = {
          invoiceNo: 'INV-' + Date.now().toString().slice(-8),
          customerId: customerId || null,
          customerName: selectedCustomer ? selectedCustomer.name : 'Walk-in Customer',
          customerPhone: selectedCustomer ? selectedCustomer.phone : '',
          items: cart.map(item => ({
            productId: item.id,
            name: item.name,
            price: item.price,
            quantity: item.quantity,
            total: item.price * item.quantity
          })),
          subtotal: subtotal,
          discount: discount,
          total: total,
          paymentMethod: paymentMethod,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          createdBy: firebase.auth().currentUser?.uid || 'unknown'
        };
        batch.set(saleRef, saleData);

        await batch.commit();

        // Show invoice
        showInvoice(saleData);

        // Reset cart
        cart = [];
        discountInput.value = 0;
        updateCart();
        renderProducts();
        loadProducts(); // Refresh stock counts

        showToast('Sale completed successfully!');
      } catch (error) {
        console.error('Checkout error:', error);
        showToast('Checkout failed. Please try again.', 'error');
      } finally {
        checkoutBtn.disabled = false;
        checkoutBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Checkout';
      }
    }

    function showInvoice(saleData) {
      const invoiceContent = document.getElementById('invoiceContent');
      invoiceContent.innerHTML = `
        <div style="text-align: center; margin-bottom: 1rem;">
          <h3 style="margin-bottom: 0.25rem;">Nishar Telecom</h3>
          <p style="font-size: 0.75rem; color: var(--color-text-muted);">Invoice #${saleData.invoiceNo}</p>
          <p style="font-size: 0.75rem; color: var(--color-text-muted);">${new Date().toLocaleString('en-IN')}</p>
        </div>
        <div style="margin-bottom: 0.5rem;">
          <strong>Customer:</strong> ${saleData.customerName}<br>
          <strong>Payment:</strong> ${saleData.paymentMethod}
        </div>
        <table style="width: 100%; font-size: 0.8rem; border-collapse: collapse;">
          <thead>
            <tr style="border-bottom: 1px solid var(--color-border);">
              <th style="text-align: left; padding: 0.25rem;">Item</th>
              <th style="text-align: center;">Qty</th>
              <th style="text-align: right;">Total</th>
            </tr>
          </thead>
          <tbody>
            ${saleData.items.map(item => `
              <tr>
                <td style="padding: 0.25rem;">${item.name}</td>
                <td style="text-align: center;">${item.quantity}</td>
                <td style="text-align: right;">₹${item.total.toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div style="border-top: 2px solid var(--color-border); margin-top: 0.5rem; padding-top: 0.5rem; text-align: right; font-weight: 700;">
          Total: ₹${saleData.total.toFixed(2)}
        </div>
      `;

      document.getElementById('invoiceModal').style.display = 'flex';

      // Store sale data for PDF download
      document.getElementById('downloadPdfBtn').onclick = () => downloadPDF(saleData);
    }

    function downloadPDF(saleData) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text('Nishar Telecom', 105, 15, { align: 'center' });
      doc.setFontSize(10);
      doc.text(`Invoice: ${saleData.invoiceNo}`, 105, 22, { align: 'center' });
      doc.text(`Date: ${new Date().toLocaleString('en-IN')}`, 105, 27, { align: 'center' });
      doc.text(`Customer: ${saleData.customerName}`, 15, 35);
      doc.text(`Payment: ${saleData.paymentMethod}`, 15, 40);

      // Items table
      let y = 50;
      doc.setFontSize(9);
      doc.text('Item', 15, y);
      doc.text('Qty', 130, y);
      doc.text('Total', 170, y);
      y += 5;

      saleData.items.forEach(item => {
        doc.text(item.name, 15, y);
        doc.text(item.quantity.toString(), 130, y);
        doc.text(`Rs. ${item.total.toFixed(2)}`, 170, y);
        y += 6;
      });

      y += 3;
      doc.setFontSize(11);
      doc.text(`Grand Total: Rs. ${saleData.total.toFixed(2)}`, 170, y, { align: 'right' });

      doc.save(`Invoice_${saleData.invoiceNo}.pdf`);
      showToast('PDF downloaded');
    }

    // ============ EVENT LISTENERS ============
    discountInput.addEventListener('input', updateCart);

    clearCartBtn.addEventListener('click', clearCart);

    checkoutBtn.addEventListener('click', checkout);

    document.getElementById('holdBillBtn').addEventListener('click', () => {
      if (cart.length === 0) {
        showToast('Nothing to hold', 'warning');
        return;
      }
      showToast('Bill held. You can resume later.', 'success');
      // In a real app, save the cart state to localStorage
      localStorage.setItem('heldCart', JSON.stringify(cart));
      localStorage.setItem('heldCustomer', customerSelect.value);
      localStorage.setItem('heldDiscount', discountInput.value);
    });

    // Restore held bill
    const heldCart = localStorage.getItem('heldCart');
    if (heldCart) {
      try {
        cart = JSON.parse(heldCart);
        customerSelect.value = localStorage.getItem('heldCustomer') || '';
        discountInput.value = localStorage.getItem('heldDiscount') || '0';
        updateCart();
        localStorage.removeItem('heldCart');
        localStorage.removeItem('heldCustomer');
        localStorage.removeItem('heldDiscount');
        showToast('Held bill restored');
      } catch (e) {
        console.error('Failed to restore held cart:', e);
      }
    }

    productSearch.addEventListener('input', () => {
      const term = productSearch.value.toLowerCase();
      const category = categoryFilter.value;
      filterProducts(term, category);
    });

    categoryFilter.addEventListener('change', () => {
      const term = productSearch.value.toLowerCase();
      const category = categoryFilter.value;
      filterProducts(term, category);
    });

    function filterProducts(term, category) {
      let filtered = products;
      if (term) {
        filtered = filtered.filter(p => 
          (p.name || '').toLowerCase().includes(term) ||
          (p.brand || '').toLowerCase().includes(term) ||
          (p.model || '').toLowerCase().includes(term)
        );
      }
      if (category) {
        filtered = filtered.filter(p => p.category === category);
      }
      renderProducts(filtered);
    }

    // Quick customer add
    const quickCustomerModal = document.getElementById('quickCustomerModal');
    document.getElementById('addCustomerQuickBtn').addEventListener('click', () => {
      quickCustomerModal.style.display = 'flex';
    });
    document.getElementById('closeQuickCustomerModal').addEventListener('click', () => {
      quickCustomerModal.style.display = 'none';
    });
    document.getElementById('cancelQuickCustomerBtn').addEventListener('click', () => {
      quickCustomerModal.style.display = 'none';
    });
    quickCustomerModal.addEventListener('click', (e) => {
      if (e.target === quickCustomerModal) quickCustomerModal.style.display = 'none';
    });

    document.getElementById('quickCustomerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('quickCustomerName').value.trim();
      const phone = document.getElementById('quickCustomerPhone').value.trim();

      if (!name || !phone) {
        showToast('Please fill all required fields', 'error');
        return;
      }

      try {
        const docRef = await firebase.firestore().collection('customers').add({
          name: name,
          phone: phone,
          email: '',
          address: '',
          notes: '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Refresh customer list and select the new customer
        await loadCustomers();
        customerSelect.value = docRef.id;
        quickCustomerModal.style.display = 'none';
        document.getElementById('quickCustomerForm').reset();
        showToast('Customer added successfully');
      } catch (error) {
        console.error('Error adding customer:', error);
        showToast('Failed to add customer', 'error');
      }
    });

    // Invoice modal
    const invoiceModal = document.getElementById('invoiceModal');
    document.getElementById('closeInvoiceModal').addEventListener('click', () => {
      invoiceModal.style.display = 'none';
    });
    invoiceModal.addEventListener('click', (e) => {
      if (e.target === invoiceModal) invoiceModal.style.display = 'none';
    });
    document.getElementById('newBillBtn').addEventListener('click', () => {
      invoiceModal.style.display = 'none';
      cart = [];
      discountInput.value = 0;
      updateCart();
      renderProducts();
    });

    // Print bill
    printBillBtn.addEventListener('click', () => {
      if (cart.length === 0) {
        showToast('Cart is empty', 'warning');
        return;
      }
      // Quick print without saving
      const invoiceContent = document.getElementById('invoiceContent');
      const tempSaleData = {
        invoiceNo: 'DRAFT-' + Date.now().toString().slice(-6),
        customerName: customerSelect.selectedOptions[0]?.textContent || 'Walk-in Customer',
        paymentMethod: document.getElementById('paymentMethod').value,
        items: cart.map(item => ({
          name: item.name,
          quantity: item.quantity,
          total: item.price * item.quantity
        })),
        total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) - (parseFloat(discountInput.value) || 0)
      };

      document.getElementById('invoiceContent').innerHTML = `
        <div style="text-align: center; margin-bottom: 1rem;">
          <h3>Nishar Telecom</h3>
          <p style="font-size: 0.75rem;">Draft #${tempSaleData.invoiceNo}</p>
        </div>
        <div>Customer: ${tempSaleData.customerName}</div>
        <table style="width: 100%; font-size: 0.8rem;">
          ${tempSaleData.items.map(i => `<tr><td>${i.name}</td><td>x${i.quantity}</td><td>₹${i.total.toFixed(2)}</td></tr>`).join('')}
        </table>
        <div style="text-align: right; font-weight: 700; margin-top: 0.5rem;">Total: ₹${tempSaleData.total.toFixed(2)}</div>
      `;
      document.getElementById('invoiceModal').style.display = 'flex';
      document.getElementById('downloadPdfBtn').onclick = () => downloadPDF(tempSaleData);
    });

    // ============ INIT ============
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      loadProducts();
      loadCustomers();
    });

    // Make functions globally accessible for onclick handlers
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
  </script>
</body>
</html>
