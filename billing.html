<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing — Nishar Telecom POS</title>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-content" style="padding:var(--sp-4);">

      <div class="billing-layout">
        <!-- LEFT: Products -->
        <div class="card" style="display:flex;flex-direction:column;gap:var(--sp-4);overflow:hidden;">
          <!-- Search row -->
          <div style="display:flex;gap:var(--sp-3);flex-wrap:wrap;flex-shrink:0;">
            <div class="input-group" style="flex:1;min-width:180px;">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input type="text" class="form-input" id="product-search" placeholder="Search products…"/>
            </div>
            <select class="form-select" id="category-filter" style="width:auto;min-width:140px;">
              <option value="">All Categories</option>
              <option value="Smartphones">Smartphones</option>
              <option value="Tablets">Tablets</option>
              <option value="Accessories">Accessories</option>
              <option value="SIM Cards">SIM Cards</option>
              <option value="Recharge">Recharge</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <!-- Product grid -->
          <div class="product-grid" id="product-grid"></div>
          <div id="product-empty" style="display:none;" class="empty-state">
            <div class="empty-state-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <h3>No products found</h3>
            <p>Try a different search or category</p>
          </div>
        </div>

        <!-- RIGHT: Cart -->
        <div class="cart-panel">
          <div class="cart-head">
            <h2>Current Bill</h2>
            <button class="btn-icon-ghost" id="clear-cart-btn" title="Clear cart">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>

          <div class="cart-customer">
            <div style="display:flex;gap:var(--sp-2);align-items:flex-end;">
              <div class="form-group" style="flex:1;margin:0;">
                <label class="form-label">Customer</label>
                <select class="form-select" id="customer-select">
                  <option value="">Walk-in Customer</option>
                </select>
              </div>
              <button class="btn btn-secondary btn-icon" id="add-customer-btn" title="Add new customer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>

          <div class="cart-items" id="cart-items">
            <div class="cart-empty">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              <p style="font-weight:500;margin-top:var(--sp-2);">Cart is empty</p>
              <p style="font-size:var(--fs-xs);">Click products to add them</p>
            </div>
          </div>

          <div class="cart-foot">
            <div class="cart-row">
              <span class="text-muted">Subtotal</span>
              <span class="text-mono" id="subtotal">₹0.00</span>
            </div>
            <div class="cart-row">
              <span class="text-muted">Discount (₹)</span>
              <input type="number" class="form-input" id="discount-input" value="0" min="0"
                     style="width:90px;text-align:right;padding:4px 8px;font-family:'IBM Plex Mono',monospace;"/>
            </div>
            <div class="cart-row">
              <span class="text-muted">Items</span>
              <span id="item-count">0</span>
            </div>
            <div class="cart-row cart-total">
              <span>Total</span>
              <span id="grand-total">₹0.00</span>
            </div>

            <div class="form-group" style="margin-bottom:var(--sp-3);">
              <label class="form-label">Payment Method</label>
              <select class="form-select" id="payment-method">
                <option value="Cash">💵 Cash</option>
                <option value="UPI">📱 UPI</option>
                <option value="Card">💳 Card</option>
                <option value="Credit">📋 Credit (Pay Later)</option>
              </select>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2);margin-bottom:var(--sp-2);">
              <button class="btn btn-secondary" id="hold-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Hold
              </button>
              <button class="btn btn-primary" id="checkout-btn" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Checkout
              </button>
            </div>
            <button class="btn btn-secondary btn-full" id="print-btn" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 12H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Print Last Bill
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add Customer Modal -->
<div class="modal-backdrop" id="add-customer-modal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Quick Add Customer</h2>
      <button class="btn-icon-ghost" id="close-add-customer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" class="form-input" id="qc-name" placeholder="Customer name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input type="tel" class="form-input" id="qc-phone" placeholder="10-digit number"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email (optional)</label>
        <input type="email" class="form-input" id="qc-email" placeholder="email@example.com"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-add-customer">Cancel</button>
      <button class="btn btn-primary" id="save-add-customer">Save & Select</button>
    </div>
  </div>
</div>

<!-- Invoice Modal -->
<div class="modal-backdrop" id="invoice-modal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Invoice</h2>
      <button class="btn-icon-ghost" id="close-invoice-modal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="invoice-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="download-pdf-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
      <button class="btn btn-primary" id="new-bill-btn">New Bill</button>
    </div>
  </div>
</div>

<!-- Confirm modal (shared) -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal modal-sm">
    <div class="modal-body" style="text-align:center;padding:var(--sp-8) var(--sp-6);">
      <div class="confirm-icon danger" id="confirm-icon" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);background:var(--danger-bg);color:var(--danger);"></div>
      <h3 style="font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-2);" id="confirm-title">Confirm</h3>
      <p style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:var(--sp-6);" id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:var(--sp-3);justify-content:center;">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/billing.js"></script>
</body>
</html>
